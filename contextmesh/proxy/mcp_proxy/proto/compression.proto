syntax = "proto3";

package contextmesh;

service CompressionService {
  rpc Compress (CompressRequest) returns (CompressResponse);
  rpc Health (HealthRequest) returns (HealthResponse);
}

message CompressRequest {
  string session_id = 1;
  string task_id = 2;
  string tool_name = 3;
  string tool_args_json = 4;
  string raw_output = 5;
  string task_description = 6;
  repeated string recent_steps = 7;
  int32 budget_tokens = 8;
}

message CompressResponse {
  string compressed_output = 1;
  int32 original_tokens = 2;
  int32 compressed_tokens = 3;
  float compression_ratio = 4;
  int32 chunks_selected = 5;
  int32 chunks_total = 6;
  string trace_id = 7;
  repeated string chunk_types_selected = 8;
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
}
