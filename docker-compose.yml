version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: contextmesh
      POSTGRES_USER: contextmesh
      POSTGRES_PASSWORD: contextmesh
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contextmesh"]
      interval: 10s
      timeout: 5s
      retries: 5

  compression_service:
    build:
      context: .
      dockerfile: Dockerfile.core
    environment:
      CONTEXTMESH_DATABASE_URL: postgresql://contextmesh:contextmesh@postgres:5432/contextmesh
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "50051:50051"

  mcp_proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    environment:
      CONTEXTMESH_COMPRESSION_GRPC_HOST: compression_service
      CONTEXTMESH_COMPRESSION_GRPC_PORT: "50051"
    depends_on:
      compression_service:
        condition: service_started
    ports:
      - "8081:8081"

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    environment:
      CONTEXTMESH_DATABASE_URL: postgresql://contextmesh:contextmesh@postgres:5432/contextmesh
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8082:8082"

volumes:
  postgres_data:
