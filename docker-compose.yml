services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: contextmesh
      POSTGRES_USER: contextmesh
      POSTGRES_PASSWORD: contextmesh
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contextmesh"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.core
    command: ["python", "-m", "contextmesh.db", "migrate"]
    environment:
      CONTEXTMESH_DATABASE_URL: postgresql://contextmesh:contextmesh@postgres:5432/contextmesh
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  compression_service:
    build:
      context: .
      dockerfile: Dockerfile.core
    environment:
      CONTEXTMESH_DATABASE_URL: postgresql://contextmesh:contextmesh@postgres:5432/contextmesh
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "50051:50051"

  # The proxy speaks MCP over stdio; attach an agent with
  #   docker compose run --rm mcp_proxy
  # after setting CONTEXTMESH_UPSTREAM (SSE URL) or
  # CONTEXTMESH_UPSTREAM_COMMAND (stdio command) in the environment.
  mcp_proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    stdin_open: true
    environment:
      CONTEXTMESH_COMPRESSION_GRPC_HOST: compression_service
      CONTEXTMESH_COMPRESSION_GRPC_PORT: "50051"
      CONTEXTMESH_UPSTREAM: ${CONTEXTMESH_UPSTREAM:-}
      CONTEXTMESH_UPSTREAM_COMMAND: ${CONTEXTMESH_UPSTREAM_COMMAND:-}
      CONTEXTMESH_TOOL_BUDGETS: ${CONTEXTMESH_TOOL_BUDGETS:-}
    depends_on:
      compression_service:
        condition: service_started
    profiles: ["proxy"]

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    environment:
      CONTEXTMESH_DATABASE_URL: postgresql://contextmesh:contextmesh@postgres:5432/contextmesh
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8082:8082"

volumes:
  postgres_data:
